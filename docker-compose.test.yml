services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: leanstock_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leanstock_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  test:
    build: .
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      APP_ENV: test
      SECRET_KEY: test-secret-key-with-at-least-32-chars
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/leanstock_test
      REDIS_URL: redis://redis:6379/15
      CORS_ORIGINS: http://localhost:3000
      EMAIL_ENABLED: "false"
      GMAIL_SENDER_EMAIL: tests@example.com
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "pytest"]
