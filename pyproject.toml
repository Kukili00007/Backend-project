[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".vendor", "FinalProject_Specs"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC"]
ignore = ["B008", "E402", "E501", "UP017", "UP037"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
