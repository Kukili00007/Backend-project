services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: leanstock_db
      POSTGRES_USER: leanstock
      POSTGRES_PASSWORD: leanstock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanstock -d leanstock_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      SERVICE_ROLE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:8080"

  worker:
    build:
      context: ./deploy/worker
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      SERVICE_ROLE: worker
      DATABASE_NULL_POOL: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./deploy/beat
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      SERVICE_ROLE: beat
      DATABASE_NULL_POOL: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
