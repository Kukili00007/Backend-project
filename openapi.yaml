openapi: 3.1.0
info:
  title: LeanStock Inventory API
  description: LeanStock backend with JWT auth/RBAC, email verification, password
    reset, multi-tenant catalog, atomic inventory transfers, Redis reservations, Gmail
    OAuth2 email delivery, and scheduled dead-stock decay.
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health check
      operationId: healthcheck_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Healthcheck Health Get
  /v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register
      operationId: register_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      operationId: login_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh
      operationId: refresh_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/logout:
    post:
      tags:
      - Authentication
      summary: Logout
      operationId: logout_v1_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v1/auth/verify-email:
    post:
      tags:
      - Authentication
      summary: Verify Email Endpoint
      operationId: verify_email_endpoint_v1_auth_verify_email_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/resend-verification:
    post:
      tags:
      - Authentication
      summary: Resend Verification Endpoint
      operationId: resend_verification_endpoint_v1_auth_resend_verification_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/password-reset/request:
    post:
      tags:
      - Authentication
      summary: Password Reset Request Endpoint
      operationId: password_reset_request_endpoint_v1_auth_password_reset_request_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/password-reset/confirm:
    post:
      tags:
      - Authentication
      summary: Password Reset Confirm Endpoint
      operationId: password_reset_confirm_endpoint_v1_auth_password_reset_confirm_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/warehouses:
    get:
      tags:
      - Warehouses
      summary: Read Warehouses
      operationId: read_warehouses_v1_warehouses_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/WarehouseResponse'
                type: array
                title: Response Read Warehouses V1 Warehouses Get
      security:
      - HTTPBearer: []
    post:
      tags:
      - Warehouses
      summary: Create Warehouse Endpoint
      operationId: create_warehouse_endpoint_v1_warehouses_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseCreateRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v1/products:
    get:
      tags:
      - Products
      summary: Read Products
      operationId: read_products_v1_products_get
      security:
      - HTTPBearer: []
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
      - name: is_active
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Active
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Products
      summary: Create Product Endpoint
      operationId: create_product_endpoint_v1_products_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/products/{product_id}:
    get:
      tags:
      - Products
      summary: Read Product
      operationId: read_product_v1_products__product_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: product_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Product Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/inventory:
    get:
      tags:
      - Inventory
      summary: Read Inventory
      operationId: read_inventory_v1_inventory_get
      security:
      - HTTPBearer: []
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: warehouse_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Warehouse Id
      - name: decay_status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^(normal|liquidating)$
          - type: 'null'
          title: Decay Status
      - name: low_stock_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Low Stock Only
      - name: sku
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Sku
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryPageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/inventory/adjust:
    post:
      tags:
      - Inventory
      summary: Adjust Inventory Endpoint
      operationId: adjust_inventory_endpoint_v1_inventory_adjust_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryAdjustRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItemResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v1/inventory/reserve:
    post:
      tags:
      - Inventory
      summary: Reserve Inventory Endpoint
      operationId: reserve_inventory_endpoint_v1_inventory_reserve_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v1/transfers:
    get:
      tags:
      - Transfers
      summary: Read Transfers
      operationId: read_transfers_v1_transfers_get
      security:
      - HTTPBearer: []
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TransferStatus'
          - type: 'null'
          title: Status
      - name: warehouse_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Warehouse Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferPageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Transfers
      summary: Create Transfer Endpoint
      operationId: create_transfer_endpoint_v1_transfers_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/transfers/{transfer_id}/confirm:
    post:
      tags:
      - Transfers
      summary: Confirm Transfer Endpoint
      operationId: confirm_transfer_endpoint_v1_transfers__transfer_id__confirm_post
      security:
      - HTTPBearer: []
      parameters:
      - name: transfer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Transfer Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferConfirmRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/transfers/{transfer_id}/cancel:
    post:
      tags:
      - Transfers
      summary: Cancel Transfer Endpoint
      operationId: cancel_transfer_endpoint_v1_transfers__transfer_id__cancel_post
      security:
      - HTTPBearer: []
      parameters:
      - name: transfer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Transfer Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/admin/email-jobs:
    get:
      tags:
      - Admin
      summary: Read Email Jobs
      operationId: read_email_jobs_v1_admin_email_jobs_get
      security:
      - HTTPBearer: []
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailJobPageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/admin/decay/run:
    post:
      tags:
      - Admin
      summary: Run Decay Now
      operationId: run_decay_now_v1_admin_decay_run_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecayRunResponse'
      security:
      - HTTPBearer: []
components:
  schemas:
    DecayRunResponse:
      properties:
        marked_liquidating:
          type: integer
          title: Marked Liquidating
        discounted:
          type: integer
          title: Discounted
      type: object
      required:
      - marked_liquidating
      - discounted
      title: DecayRunResponse
    EmailJobPageResponse:
      properties:
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
        has_more:
          type: boolean
          title: Has More
        total_count:
          type: integer
          title: Total Count
        data:
          items:
            $ref: '#/components/schemas/EmailJobResponse'
          type: array
          title: Data
      type: object
      required:
      - next_cursor
      - has_more
      - total_count
      - data
      title: EmailJobPageResponse
    EmailJobResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        recipient_email:
          type: string
          format: email
          title: Recipient Email
        subject:
          type: string
          title: Subject
        purpose:
          type: string
          title: Purpose
        status:
          type: string
          title: Status
        retry_count:
          type: integer
          title: Retry Count
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
        created_at:
          type: string
          format: date-time
          title: Created At
        sent_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Sent At
      type: object
      required:
      - id
      - recipient_email
      - subject
      - purpose
      - status
      - retry_count
      - error_message
      - created_at
      - sent_at
      title: EmailJobResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InventoryAdjustRequest:
      properties:
        variant_id:
          type: string
          format: uuid
          title: Variant Id
        warehouse_id:
          type: string
          format: uuid
          title: Warehouse Id
        quantity_delta:
          type: integer
          title: Quantity Delta
          examples:
          - -3
        reason:
          type: string
          enum:
          - damage
          - theft
          - surplus
          - count_correction
          - other
          title: Reason
        note:
          anyOf:
          - type: string
            maxLength: 500
          - type: 'null'
          title: Note
      type: object
      required:
      - variant_id
      - warehouse_id
      - quantity_delta
      - reason
      title: InventoryAdjustRequest
    InventoryItemResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        warehouse_id:
          type: string
          format: uuid
          title: Warehouse Id
        quantity:
          type: integer
          title: Quantity
        reorder_threshold:
          type: integer
          title: Reorder Threshold
        is_low_stock:
          type: boolean
          title: Is Low Stock
        decay_status:
          type: string
          enum:
          - normal
          - liquidating
          title: Decay Status
        current_price:
          type: string
          pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Current Price
        discount_pct:
          type: string
          pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Discount Pct
        last_sold_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Sold At
        variant:
          $ref: '#/components/schemas/InventoryVariantView'
      type: object
      required:
      - id
      - warehouse_id
      - quantity
      - reorder_threshold
      - is_low_stock
      - decay_status
      - current_price
      - discount_pct
      - last_sold_at
      - variant
      title: InventoryItemResponse
    InventoryPageResponse:
      properties:
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
        has_more:
          type: boolean
          title: Has More
        total_count:
          type: integer
          title: Total Count
        data:
          items:
            $ref: '#/components/schemas/InventoryItemResponse'
          type: array
          title: Data
      type: object
      required:
      - next_cursor
      - has_more
      - total_count
      - data
      title: InventoryPageResponse
    InventoryVariantView:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        product_id:
          type: string
          format: uuid
          title: Product Id
        product_name:
          type: string
          title: Product Name
        sku:
          type: string
          title: Sku
        color:
          anyOf:
          - type: string
          - type: 'null'
          title: Color
        size:
          anyOf:
          - type: string
          - type: 'null'
          title: Size
        barcode:
          anyOf:
          - type: string
          - type: 'null'
          title: Barcode
        selling_price:
          type: string
          pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Selling Price
        liquidation_floor_price:
          type: string
          pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Liquidation Floor Price
        cost_price:
          anyOf:
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          - type: 'null'
          title: Cost Price
      type: object
      required:
      - id
      - product_id
      - product_name
      - sku
      - selling_price
      - liquidation_floor_price
      title: InventoryVariantView
    LoginRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
          examples:
          - admin@arzanshop.kz
        password:
          type: string
          minLength: 8
          title: Password
          examples:
          - Secur3P@ss!
      type: object
      required:
      - email
      - password
      title: LoginRequest
    LogoutRequest:
      properties:
        refresh_token:
          type: string
          title: Refresh Token
          examples:
          - eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      type: object
      required:
      - refresh_token
      title: LogoutRequest
    MessageResponse:
      properties:
        message:
          type: string
          title: Message
          examples:
          - If the account exists, an email has been queued.
      type: object
      required:
      - message
      title: MessageResponse
    PasswordResetConfirmRequest:
      properties:
        token:
          type: string
          minLength: 32
          title: Token
          examples:
          - password-reset-token-from-link
        new_password:
          type: string
          minLength: 8
          title: New Password
          examples:
          - N3wSecur3P@ss!
      type: object
      required:
      - token
      - new_password
      title: PasswordResetConfirmRequest
    PasswordResetRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
          examples:
          - owner@arzanshop.kz
      type: object
      required:
      - email
      title: PasswordResetRequest
    ProductCreateRequest:
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 2
          title: Name
          examples:
          - Classic T-Shirt
        category:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Category
          examples:
          - Clothing
        unit_of_measure:
          type: string
          enum:
          - pcs
          - kg
          - pack
          title: Unit Of Measure
          default: pcs
        variants:
          items:
            $ref: '#/components/schemas/ProductVariantCreateRequest'
          type: array
          minItems: 1
          title: Variants
      type: object
      required:
      - name
      - variants
      title: ProductCreateRequest
    ProductPageResponse:
      properties:
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
        has_more:
          type: boolean
          title: Has More
        total_count:
          type: integer
          title: Total Count
        data:
          items:
